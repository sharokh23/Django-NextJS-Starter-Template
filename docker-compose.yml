services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      # Dev-only credentials; prod Compose requires a real password via .env.
      POSTGRES_PASSWORD: app
    ports:
      # Published for host tools (psql, GUI clients); remove if unwanted.
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      DJANGO_DEBUG: "1"
      DATABASE_URL: postgres://app:app@db:5432/app
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend,[::1]"
      # Browser origins the admin/session CSRF check should trust when Django
      # is reached through the Next.js rewrite on port 3000.
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      DJANGO_ENVIRONMENT: "development"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Preserve container node_modules over the bind mount
      - frontend_node_modules:/app/node_modules
    environment:
      # Next.js server proxies /svc/api → Django (browser-safe, no CORS).
      BACKEND_INTERNAL_URL: http://backend:8000
      # Enables webpack polling in next.config (Turbopack often misses bind-mount edits on Windows).
      DOCKER_DEV: "true"
      # Fast Refresh / HMR with bind mounts (Docker Desktop on Windows/macOS). See:
      # https://nextjs.org/docs/app/guides/local-development
      WATCHPACK_POLLING: "true"
    command: >
      sh -c "npm install && exec npm run dev:docker"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  postgres_data:
