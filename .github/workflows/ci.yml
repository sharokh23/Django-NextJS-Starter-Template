name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      # next build also runs the TypeScript check
      - run: npm run build

  backend:
    name: Backend (Django check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Settings fail closed: DEBUG defaults off and then requires a secret.
      # This value is CI-only; it satisfies check --deploy key-strength rules.
      DJANGO_SECRET_KEY: ci-only-4kq8zj2mvx7nwp3rgy6thb9scf5dua1eol0i-not-a-real-secret
      DJANGO_DEBUG: "0"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: python manage.py check
      # Fails if model changes are missing their migrations.
      - run: python manage.py makemigrations --check --dry-run
      # Run tests and publish a job summary (Vitest does this natively;
      # Django's runner needs the $GITHUB_STEP_SUMMARY markdown by hand).
      - name: Run Django tests
        run: |
          python manage.py test --verbosity 2 2>&1 | tee test-output.log
          result=${PIPESTATUS[0]}
          {
            echo "## Django Test Report"
            echo ""
            grep -E "^(Found|Ran) " test-output.log | sed 's/^/- /'
            if [ "$result" -eq 0 ]; then
              echo "- Result: ✅ **OK**"
            else
              echo "- Result: ❌ **FAILED**"
              grep -E "^(FAIL|ERROR): " test-output.log | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$result"
      # Surface deployment-checklist warnings with production-like settings
      # (fails only on errors; warnings are informational in the log).
      - run: python manage.py check --deploy
        env:
          DJANGO_HTTPS: "1"

  docker:
    name: Production images build
    runs-on: ubuntu-latest
    env:
      # docker-compose.prod.yml requires these at interpolation time
      # (${VAR:?}); the build itself does not bake the values in.
      DJANGO_SECRET_KEY: ci-only-build-secret
      POSTGRES_PASSWORD: ci-only-build-password
    steps:
      - uses: actions/checkout@v7
      # Validates both production Dockerfile targets end to end.
      # For AWS ECS: this is where login + push to ECR and a task-definition
      # update would slot in once deployment is wired up.
      - run: docker compose -f docker-compose.prod.yml build
