version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    groups:
      pip-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directories:
      - /backend
      - /frontend
    schedule:
      interval: weekly
